<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebael – Historias que inspiran</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #e8eef8;
    --surface: rgba(255,255,255,0.75);
    --surface2: rgba(255,255,255,0.92);
    --chip-dark: #0e1c35;
    --accent: #3b7ef4;
    --accent2: #6c4df5;
    --accent3: #f97316;
    --star: #f59e0b;
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-muted: #94a3b8;
    --border: rgba(148,163,184,0.28);
    --card-radius: 20px;
    --shadow-sm: 0 2px 12px rgba(59,126,244,0.07);
    --shadow-md: 0 8px 32px rgba(59,126,244,0.13);
    --shadow-lg: 0 20px 60px rgba(59,126,244,0.2);
    --font-display: 'Sora', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);min-height:100vh;overflow-x:hidden;position:relative}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 5% 0%,rgba(59,126,244,0.14) 0%,transparent 55%),radial-gradient(ellipse 55% 45% at 95% 10%,rgba(108,77,245,0.11) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(59,126,244,0.08) 0%,transparent 55%),linear-gradient(160deg,#d5e3f7 0%,#e8eef8 45%,#edf1fb 100%);pointer-events:none;z-index:0}
  .page{position:relative;z-index:1}
  svg{display:block}

  /* LOGIN */
  #login-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(180,200,230,0.5);animation:fadeIn .4s ease}
  .login-card{background:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.95);border-radius:28px;padding:48px 44px;width:440px;max-width:94vw;backdrop-filter:blur(40px);box-shadow:0 32px 80px rgba(59,126,244,0.2),0 0 0 1px rgba(59,126,244,0.07);animation:slideUp .5s cubic-bezier(.16,1,.3,1)}
  .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
  .login-logo .logo-icon{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(59,126,244,0.35)}
  .login-logo .logo-text{font-family:var(--font-display);font-size:26px;font-weight:800;background:linear-gradient(90deg,var(--text-primary) 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .login-card h2{font-family:var(--font-display);font-size:26px;font-weight:700;text-align:center;margin-bottom:6px;color:var(--text-primary)}
  .login-card p.subtitle{text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:30px}
  .avatar-choices{display:flex;gap:12px;justify-content:center;margin-bottom:26px}
  .avatar-btn{width:54px;height:54px;border-radius:50%;border:2px solid var(--border);background:rgba(59,126,244,0.05);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--accent)}
  .avatar-btn:hover,.avatar-btn.active{border-color:var(--accent);background:rgba(59,126,244,0.1);transform:scale(1.1);box-shadow:0 4px 14px rgba(59,126,244,0.2)}
  .input-group{margin-bottom:15px}
  .input-group label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.09em}
  .input-wrap{position:relative;display:flex;align-items:center}
  .input-wrap .input-icon{position:absolute;left:14px;color:var(--text-muted);pointer-events:none;display:flex}
  .input-group input{width:100%;padding:13px 18px 13px 44px;background:rgba(255,255,255,0.8);border:1.5px solid rgba(148,163,184,0.3);border-radius:12px;color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;transition:all .2s}
  .input-group input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(59,126,244,0.12)}
  .input-group input::placeholder{color:var(--text-muted)}
  .btn-login{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;color:#fff;font-family:var(--font-display);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .25s;position:relative;overflow:hidden}
  .btn-login::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);transition:left .5s}
  .btn-login:hover::before{left:100%}
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(59,126,244,0.35)}
  .login-divider{text-align:center;color:var(--text-muted);font-size:13px;margin:18px 0;position:relative}
  .login-divider::before,.login-divider::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:var(--border)}
  .login-divider::before{left:0}
  .login-divider::after{right:0}
  .social-btns{display:flex;gap:10px}
  .social-btn{flex:1;padding:11px;background:rgba(255,255,255,0.8);border:1.5px solid rgba(148,163,184,0.25);border-radius:12px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
  .social-btn:hover{background:#fff;border-color:rgba(59,126,244,0.3);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .login-footer{text-align:center;margin-top:18px;font-size:13px;color:var(--text-muted)}
  .login-footer a{color:var(--accent);cursor:pointer;font-weight:700}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:100;padding:12px 32px;display:flex;align-items:center;gap:20px;background:rgba(220,230,245,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(148,163,184,0.18)}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
  .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(59,126,244,0.3)}
  .logo-text{font-family:var(--font-display);font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--text-primary) 50%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

  /* DARK CHIP — ONLY dark element */
  .nav-chip{background:var(--chip-dark);border-radius:40px;padding:5px 6px;display:flex;gap:3px;margin:0 auto;box-shadow:0 4px 20px rgba(14,28,53,0.28)}
  .nav-chip button{padding:8px 20px;border-radius:32px;border:none;background:transparent;color:rgba(255,255,255,0.48);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
  .nav-chip button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(59,126,244,0.4)}
  .nav-chip button:hover:not(.active){color:rgba(255,255,255,0.85)}

  .topbar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .icon-btn{width:38px;height:38px;background:var(--surface2);border:1.5px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all .2s;box-shadow:var(--shadow-sm);position:relative}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);background:#fff}
  .notif-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;background:var(--accent3);border-radius:50%;border:2px solid var(--bg-base)}
  .user-pill{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1.5px solid var(--border);border-radius:40px;padding:5px 14px 5px 5px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
  .user-pill:hover{border-color:rgba(59,126,244,0.3);background:#fff}
  .user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center}
  .user-name{font-size:13px;font-weight:700;color:var(--text-primary)}
  .badge-premium{background:linear-gradient(90deg,var(--accent3),#fb923c);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}

  /* MAIN */
  .main{padding:26px 32px 120px;max-width:1400px;margin:0 auto}

  /* HERO */
  .hero-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:30px}
  .hero-card{border-radius:28px;padding:32px 36px;position:relative;overflow:hidden;cursor:pointer;min-height:252px;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .38s cubic-bezier(.16,1,.3,1),box-shadow .38s;box-shadow:0 24px 70px rgba(0,0,0,0.32),0 0 0 1px rgba(255,255,255,0.05)}
  .hero-card:hover{transform:translateY(-7px);box-shadow:0 44px 95px rgba(0,0,0,0.44),0 0 0 1px rgba(255,255,255,0.1)}
  .hero-card::before{content:'';position:absolute;inset:0;background:var(--card-bg);z-index:0}
  .hero-card::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0) 38%,rgba(0,0,0,0.64) 100%);z-index:2;pointer-events:none}
  .hero-1{--card-bg:linear-gradient(148deg,#0d1d4a 0%,#1b3d82 48%,#0b1a42 100%)}
  .hero-2{--card-bg:linear-gradient(148deg,#150836 0%,#3b1d82 50%,#100728 100%)}
  .hero-orb{position:absolute;border-radius:50%;filter:blur(75px);pointer-events:none;z-index:1}
  .hero-orb-a{width:280px;height:280px;top:-90px;left:-60px}
  .hero-orb-b{width:190px;height:190px;bottom:-55px;right:55px}
  .hero-1 .hero-orb-a{background:rgba(59,126,244,0.55)}
  .hero-1 .hero-orb-b{background:rgba(108,77,245,0.45)}
  .hero-2 .hero-orb-a{background:rgba(108,77,245,0.55)}
  .hero-2 .hero-orb-b{background:rgba(249,115,22,0.38)}
  .hero-cover-float{position:absolute;right:30px;top:50%;transform:translateY(-50%) rotate(-6deg);z-index:5;transition:transform .45s cubic-bezier(.16,1,.3,1)}
  .hero-card:hover .hero-cover-float{transform:translateY(-54%) rotate(-3deg) scale(1.07)}
  .hero-cover-float img{display:block;border-radius:20px;object-fit:cover;border:2.5px solid rgba(255,255,255,0.18);box-shadow:0 32px 66px rgba(0,0,0,0.62),0 0 0 1px rgba(255,255,255,0.07),-7px 9px 28px rgba(0,0,0,0.38)}
  .hero-1 .hero-cover-float img{width:158px;height:158px;border-radius:22px}
  .hero-2 .hero-cover-float img{width:120px;height:120px;border-radius:18px}
  .hero-cover-glow{position:absolute;right:-8px;top:2%;width:268px;height:268px;border-radius:50%;filter:blur(68px);opacity:0.36;z-index:3;pointer-events:none}
  .hero-cover-ring{position:absolute;right:18px;top:50%;width:188px;height:188px;transform:translateY(-50%);border-radius:50%;border:1px solid rgba(255,255,255,0.07);z-index:4;pointer-events:none}
  .hero-1 .hero-cover-ring{width:210px;height:210px;right:20px}
  .hero-content{position:relative;z-index:6}
  .hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:5px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;color:rgba(255,255,255,0.9)}
  .hero-card h2{font-family:var(--font-display);font-size:27px;font-weight:800;line-height:1.18;margin-bottom:12px;color:#fff;text-shadow:0 4px 22px rgba(0,0,0,0.38)}
  .hero-2 h2{font-size:22px}
  .hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .hero-info{font-size:12px;color:rgba(255,255,255,0.52)}
  .play-btn{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.13);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.22);border-radius:32px;padding:10px 22px;font-family:var(--font-body);font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:all .25s}
  .play-btn:hover{background:rgba(255,255,255,0.22);transform:scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,0.28)}
  .play-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(59,126,244,0.5);flex-shrink:0}

  /* CATEGORIES */
  .category-strip{display:flex;gap:8px;margin-bottom:26px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .category-strip::-webkit-scrollbar{display:none}
  .cat-chip{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:30px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:var(--font-body);box-shadow:var(--shadow-sm)}
  .cat-chip:hover{border-color:rgba(59,126,244,0.35);color:var(--accent);background:#fff}
  .cat-chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(59,126,244,0.3)}

  /* SECTION */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .section-header h3{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:9px}
  .section-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .see-all{font-size:13px;font-weight:700;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none;font-family:var(--font-body);transition:all .2s}
  .see-all:hover{color:var(--accent2)}

  /* BOOK CARDS */
  .books-row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:36px}
  .book-card{border-radius:16px;overflow:hidden;background:var(--surface2);border:1.5px solid var(--border);cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow-sm)}
  .book-card:hover{transform:translateY(-6px);border-color:rgba(59,126,244,0.28);box-shadow:0 20px 50px rgba(59,126,244,0.16)}
  .book-cover{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .book-cover::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(0deg,rgba(0,0,0,0.4) 0%,transparent 100%)}
  .book-cover-icon{position:relative;z-index:1}
  .book-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.28);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:2}
  .book-card:hover .book-play-overlay{opacity:1}
  .book-play-circle{width:48px;height:48px;background:rgba(255,255,255,0.92);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);transform:scale(.8);transition:transform .2s;box-shadow:0 4px 16px rgba(0,0,0,0.18)}
  .book-card:hover .book-play-circle{transform:scale(1)}
  .book-info{padding:11px 12px 13px}
  .book-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:3px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .book-author{font-size:11px;color:var(--text-muted);margin-bottom:7px}
  .book-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px}
  .book-rating{display:flex;align-items:center;gap:3px;color:var(--star);font-weight:700}
  .book-age{background:rgba(59,126,244,0.1);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
  .c1{background:linear-gradient(135deg,#1e4a8f,#4f8ef7)}
  .c2{background:linear-gradient(135deg,#5b1f9c,#9b59b6)}
  .c3{background:linear-gradient(135deg,#1a6b3a,#27ae60)}
  .c4{background:linear-gradient(135deg,#8b3a1f,#e67e22)}
  .c5{background:linear-gradient(135deg,#1f4a8b,#3498db)}
  .c6{background:linear-gradient(135deg,#7b1f5c,#e91e8c)}
  .c7{background:linear-gradient(135deg,#2c5f6e,#16a085)}
  .c8{background:linear-gradient(135deg,#4a2c1f,#c0392b)}
  .c9{background:linear-gradient(135deg,#1f3a6e,#2980b9)}
  .c10{background:linear-gradient(135deg,#3a1f6e,#8e44ad)}
  .c11{background:linear-gradient(135deg,#1f5a2c,#2ecc71)}
  .c12{background:linear-gradient(135deg,#6e3a1f,#d35400)}

  /* PLAYER */
  #player-modal{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(6,10,28,0.75);backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);opacity:0;pointer-events:none;transition:opacity .4s ease}
  #player-modal.open{opacity:1;pointer-events:all}
  .player-card{width:420px;max-width:95vw;background:linear-gradient(160deg,#141f40 0%,#0c1528 55%,#101c38 100%);border:1px solid rgba(255,255,255,0.07);border-radius:36px;overflow:hidden;box-shadow:0 60px 140px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04);transform:translateY(44px) scale(.91);transition:transform .55s cubic-bezier(.16,1,.3,1);position:relative}
  #player-modal.open .player-card{transform:translateY(0) scale(1)}
  .player-header-bg{position:absolute;inset:0;z-index:0;opacity:0.13;transition:background .7s;background-size:cover;background-position:center;filter:blur(2px)}
  .player-close{position:absolute;top:18px;right:18px;width:34px;height:34px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.14);border-radius:50%;color:rgba(255,255,255,0.75);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .22s;backdrop-filter:blur(10px)}
  .player-close:hover{background:rgba(255,255,255,0.2);color:#fff;transform:scale(1.08)}
  .player-inner{position:relative;z-index:1;padding:26px 28px 30px;display:flex;flex-direction:column;align-items:center}
  .player-top-tag{background:rgba(59,126,244,0.18);border:1px solid rgba(59,126,244,0.28);color:rgba(130,178,255,0.85);font-size:10px;font-weight:700;padding:4px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:24px;align-self:flex-start}
  .player-cover-wrap{position:relative;margin-bottom:24px}
  .player-cover-icon{width:192px;height:192px;border-radius:26px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 28px 70px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.07);animation:float 4s ease-in-out infinite;background:linear-gradient(135deg,#1e4a8f,#4f8ef7)}
  .player-cover-icon img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
  .player-cover-glow{position:absolute;inset:-30px;border-radius:50%;filter:blur(55px);opacity:0.45;z-index:-1;pointer-events:none;transition:background .7s}
  .player-cover-ring{position:absolute;inset:-10px;border-radius:34px;border:1px solid rgba(255,255,255,0.07);background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 55%);pointer-events:none}
  .player-title-section{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
  .player-title-texts{flex:1;min-width:0}
  .player-book-title{font-family:var(--font-display);font-size:20px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-author{font-size:13px;color:rgba(255,255,255,0.42);font-weight:500}
  .fav-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.42);transition:all .2s;flex-shrink:0}
  .fav-btn:hover,.fav-btn.faved{color:#ef4444;border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.1)}
  .progress-bar-track{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;margin-bottom:8px;position:relative}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;width:0%;transition:width .5s linear;position:relative}
  .progress-bar-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 2px 12px rgba(59,126,244,0.6)}
  .progress-times{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.32);font-weight:600;margin-bottom:24px}
  .player-controls{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:22px;width:100%}
  .ctrl-btn{background:none;border:none;color:rgba(255,255,255,0.48);cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
  .ctrl-btn:hover{color:#fff;background:rgba(255,255,255,0.08)}
  .ctrl-btn.big{width:70px;height:70px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:50%;box-shadow:0 14px 38px rgba(59,126,244,0.48),0 0 0 8px rgba(59,126,244,0.1);transition:all .25s}
  .ctrl-btn.big:hover{transform:scale(1.07);box-shadow:0 18px 46px rgba(59,126,244,0.58),0 0 0 14px rgba(59,126,244,0.12)}
  .player-secondary{display:flex;align-items:center;justify-content:space-between;width:100%;gap:10px}
  .volume-row{display:flex;align-items:center;gap:8px;flex:1;max-width:120px}
  .volume-slider{flex:1;height:3px;background:rgba(255,255,255,0.14);border-radius:10px;appearance:none;-webkit-appearance:none;outline:none;cursor:pointer}
  .volume-slider::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:#fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.35)}
  .chapter-info{font-size:12px;color:rgba(255,255,255,0.28);text-align:center}
  .chapter-info span{color:rgba(255,255,255,0.68);font-weight:700}
  .player-actions{display:flex;gap:7px}
  .speed-badge{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.58);cursor:pointer;transition:all .2s;font-family:var(--font-body)}
  .speed-badge:hover{color:#fff;border-color:rgba(255,255,255,0.26)}
  .action-btn{width:34px;height:34px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.42);transition:all .2s}
  .action-btn:hover{color:#fff;border-color:rgba(255,255,255,0.22)}

  /* MINI PLAYER */
  #mini-player{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);z-index:400;background:rgba(255,255,255,0.93);border:1.5px solid rgba(148,163,184,0.22);border-radius:20px;padding:12px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 20px 60px rgba(59,126,244,0.2);backdrop-filter:blur(24px);transition:transform .4s cubic-bezier(.16,1,.3,1);cursor:pointer;min-width:340px;position:fixed}
  #mini-player.visible{transform:translateX(-50%) translateY(0)}
  .mini-cover{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mini-info{flex:1}
  .mini-title{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text-primary)}
  .mini-author{font-size:11px;color:var(--text-muted)}
  .mini-controls{display:flex;align-items:center;gap:8px}
  .mini-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;transition:color .2s;display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%}
  .mini-btn:hover{color:var(--text-primary)}
  .mini-btn.play{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:36px;height:36px;box-shadow:0 4px 14px rgba(59,126,244,0.35)}
  .mini-progress{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:0 0 20px 20px;width:0%;transition:width .5s linear}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .stagger>*{opacity:0;transform:translateY(18px);animation:staggerIn .45s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes staggerIn{to{opacity:1;transform:translateY(0)}}
  .stagger>*:nth-child(1){animation-delay:.04s}
  .stagger>*:nth-child(2){animation-delay:.09s}
  .stagger>*:nth-child(3){animation-delay:.14s}
  .stagger>*:nth-child(4){animation-delay:.19s}
  .stagger>*:nth-child(5){animation-delay:.24s}
  .stagger>*:nth-child(6){animation-delay:.29s}
</style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="login-overlay" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <img src="images/Logosebael.png" alt="Sebael" style="height:44px;width:auto;">
    </div>
    <h2>Bienvenido de vuelta</h2>
    <p class="subtitle">Tu mundo de historias y cuentos te espera</p>

    <div class="avatar-choices">
      <button class="avatar-btn active" onclick="selectAvatar(this)"><svg width="26" height="26"><use href="#i-cat"/></svg></button>
      <button class="avatar-btn" onclick="selectAvatar(this)"><svg width="26" height="26"><use href="#i-dragon"/></svg></button>
      <button class="avatar-btn" onclick="selectAvatar(this)"><svg width="26" height="26"><use href="#i-rocket"/></svg></button>
      <button class="avatar-btn" onclick="selectAvatar(this)"><svg width="26" height="26"><use href="#i-sparkle"/></svg></button>
    </div>

    <div class="input-group">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15"><use href="#i-mail"/></svg></span>
        <input type="email" placeholder="tu@correo.com">
      </div>
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="15" height="15"><use href="#i-lock"/></svg></span>
        <input type="password" placeholder="••••••••">
      </div>
    </div>

    <button class="btn-login" onclick="closeLogin()">Entrar al mundo de historias</button>

    <div class="login-divider">o continúa con</div>
    <div class="social-btns">
      <button class="social-btn" onclick="closeLogin()">
        <svg width="15" height="15"><use href="#i-globe"/></svg> Google
      </button>
      <button class="social-btn" onclick="closeLogin()">
        <svg width="15" height="15"><use href="#i-shield"/></svg> Apple
      </button>
    </div>
    <div class="login-footer">¿No tienes cuenta? <a onclick="closeLogin()">Crear cuenta gratis</a></div>
  </div>
</div>

<!-- ─── PLAYER MODAL ─── -->
<div id="player-modal">
  <div class="player-card">
    <div class="player-header-bg" id="player-header-bg"></div>
    <button class="player-close" onclick="closePlayer()">
      <svg width="11" height="11" style="color:#fff"><use href="#i-x"/></svg>
    </button>
    <div class="player-inner">
      <div class="player-top-tag" id="player-tag">Historia</div>
      <div class="player-cover-wrap">
        <div class="player-cover-glow" id="player-cover-glow"></div>
        <div class="player-cover-ring"></div>
        <div class="player-cover-icon" id="player-cover-icon">
          <svg width="80" height="80" style="filter:drop-shadow(0 8px 26px rgba(0,0,0,0.45))">
            <use href="#i-book" style="stroke:rgba(255,255,255,0.72)"/>
          </svg>
        </div>
      </div>
      <div class="player-title-section">
        <div class="player-title-texts">
          <div class="player-book-title" id="player-title">—</div>
          <div class="player-author" id="player-author">—</div>
        </div>
        <button class="fav-btn" id="fav-btn" onclick="toggleFav()">
          <svg width="17" height="17"><use href="#i-heart"/></svg>
        </button>
      </div>
      <div class="progress-bar-track" onclick="seekProgress(event)">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-times">
        <span id="current-time">00:00</span>
        <span id="total-time">—:—</span>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="skipTime(-15)"><svg width="21" height="21"><use href="#i-rotate-ccw"/></svg></button>
        <button class="ctrl-btn" onclick="prevTrack()"><svg width="20" height="20"><use href="#i-skip-back"/></svg></button>
        <button class="ctrl-btn big" id="play-pause-btn" onclick="togglePlay()">
          <svg width="25" height="25" id="pp-icon"><use href="#i-play" style="fill:#fff"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()"><svg width="20" height="20"><use href="#i-skip-fwd"/></svg></button>
        <button class="ctrl-btn" onclick="skipTime(15)"><svg width="21" height="21"><use href="#i-rotate-cw"/></svg></button>
      </div>
      <div class="player-secondary">
        <div class="volume-row">
          <svg width="14" height="14" style="color:rgba(255,255,255,0.35);flex-shrink:0"><use href="#i-volume"/></svg>
          <input type="range" class="volume-slider" min="0" max="100" value="80" oninput="audioEl.volume=this.value/100">
        </div>
        <div class="chapter-info">Episodio <span id="ep-num">1</span></div>
        <div class="player-actions">
          <button class="speed-badge" onclick="cycleSpeed()">1.0×</button>
          <button class="action-btn"><svg width="15" height="15"><use href="#i-share"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── MINI PLAYER ─── -->
<div id="mini-player" onclick="openPlayer()" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px)">
  <div class="mini-progress" id="mini-progress"></div>
  <div class="mini-cover c1" id="mini-cover">
    <svg width="22" height="22" style="color:rgba(255,255,255,0.88)"><use href="#i-book"/></svg>
  </div>
  <div class="mini-info">
    <div class="mini-title" id="mini-title">—</div>
    <div class="mini-author">Sebael</div>
  </div>
  <div class="mini-controls">
    <button class="mini-btn" onclick="event.stopPropagation();skipTime(-15)"><svg width="17" height="17"><use href="#i-skip-back"/></svg></button>
    <button class="mini-btn play" onclick="event.stopPropagation();togglePlay()" id="mini-play-btn">
      <svg width="16" height="16" id="mini-pp-icon"><use href="#i-play" style="fill:#fff"/></svg>
    </button>
    <button class="mini-btn" onclick="event.stopPropagation();nextTrack()"><svg width="17" height="17"><use href="#i-skip-fwd"/></svg></button>
  </div>
</div>

<!-- ─── MAIN APP ─── -->
<div class="page" id="main-app">
  <nav class="topbar">
    <a class="logo">
      <img src="images/Logosebael.png" alt="Sebael" style="height:36px;width:auto;">
    </a>
    <div class="nav-chip">
      <button class="active" onclick="setNav(this);filterCat('all')">Todos</button>
      <button onclick="setNav(this);filterCat('Cuentos para dormir')">Para dormir</button>
      <button onclick="setNav(this);filterCat('Fe y valores')">Fe & Valores</button>
      <button onclick="setNav(this);filterCat('Próximamente')">Próximamente</button>
    </div>
    <div class="topbar-right">
      <button class="icon-btn"><svg width="17" height="17"><use href="#i-search"/></svg></button>
      <div class="icon-btn"><svg width="17" height="17"><use href="#i-bell"/></svg><span class="notif-dot"></span></div>
      <div class="user-pill" onclick="openPlayer()">
        <div class="user-avatar"><svg width="15" height="15" style="color:#fff"><use href="#i-user"/></svg></div>
        <span class="user-name">Lucía M.</span>
        <span class="badge-premium">Premium</span>
      </div>
    </div>
  </nav>

  <main class="main">
    <!-- HERO -->
    <div class="hero-grid stagger" id="heroGrid"></div>

    <!-- CATEGORIES -->
    <div class="category-strip">
      <button class="cat-chip" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-fire"/></svg> Tendencias</button>
      <button class="cat-chip active" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-sparkle"/></svg> Fantasía</button>
      <button class="cat-chip" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-cat"/></svg> Animales</button>
      <button class="cat-chip" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-rocket"/></svg> Aventura</button>
      <button class="cat-chip" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-moon"/></svg> Para Dormir</button>
      <button class="cat-chip" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-graduation"/></svg> Educativo</button>
      <button class="cat-chip" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-users"/></svg> Familia</button>
      <button class="cat-chip" onclick="setCategory(this)"><svg width="13" height="13"><use href="#i-globe"/></svg> Clásicos</button>
    </div>

    <!-- CATALOG -->
    <div class="section-header">
      <h3><span class="section-icon"><svg width="15" height="15" style="color:#fff"><use href="#i-sparkle"/></svg></span> Nuestras historias</h3>
    </div>
    <div class="books-row stagger" id="mainGrid"></div>

    <!-- SOON -->
    <div class="section-header">
      <h3><span class="section-icon"><svg width="15" height="15" style="color:#fff"><use href="#i-moon"/></svg></span> Próximamente</h3>
    </div>
    <div class="books-row stagger" id="soonGrid"></div>
  </main>
</div>

<audio id="audioEl" preload="metadata"></audio>
<script>
  var books = [], currentBook = null, isPlaying = false;
  var audioEl = document.getElementById('audioEl');
  var grads = ['linear-gradient(135deg,#1e4a8f,#4f8ef7)',
               'linear-gradient(135deg,#5b1f9c,#9b59b6)',
               'linear-gradient(135deg,#1a6b3a,#27ae60)',
               'linear-gradient(135deg,#8b3a1f,#e67e22)',
               'linear-gradient(135deg,#1f4a8b,#3498db)',
               'linear-gradient(135deg,#7b1f5c,#e91e8c)',
               'linear-gradient(135deg,#2c5f6e,#16a085)',
               'linear-gradient(135deg,#4a2c1f,#c0392b)'];

  function getPos(id){ return parseFloat(localStorage.getItem('pos_'+id)||0); }
  function savePos(id,t){ localStorage.setItem('pos_'+id, t); }

  function closeLogin(){ document.getElementById('login-overlay').style.display='none'; document.getElementById('main-app').style.display='block'; }
  function selectAvatar(b){ document.querySelectorAll('.avatar-btn').forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); }
  function setNav(b){ document.querySelectorAll('.nav-chip button').forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); }
  function setCategory(b){ document.querySelectorAll('.cat-chip').forEach(function(x){x.classList.remove('active');}); b.classList.add('active'); }

  function cardHTML(b, idx) {
    var bg   = b.cover ? 'url("'+b.cover+'") center/cover no-repeat' : grads[idx % grads.length];
    var inner = b.cover
      ? '<img src="'+b.cover+'" alt="'+b.title+'" style="width:100%;height:100%;object-fit:cover;">'
      : '<svg class="book-cover-icon" width="50" height="50" style="color:rgba(255,255,255,0.82)"><use href="#i-book"/></svg>';
    var soon  = b.soon
      ? '<div style="position:absolute;top:8px;left:8px;background:rgba(99,102,241,0.85);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.06em;">PRÓXIMAMENTE</div>' : '';
    var click = b.soon ? 'style="cursor:default;opacity:0.8;"' : 'onclick="openBook('+idx+')" style="cursor:pointer;"';
    return '<div class="book-card" '+click+'>'
      + '<div class="book-cover" style="background:'+bg+';position:relative;">'
      + '<div class="book-play-overlay"><div class="book-play-circle"><svg width="16" height="16"><use href="#i-play"/></svg></div></div>'
      + inner + soon
      + '</div>'
      + '<div class="book-info">'
      + '<div class="book-title">'+b.title+'</div>'
      + '<div class="book-author">'+(b.book||'Sebael')+'</div>'
      + '<div class="book-meta"><span class="book-age">'+(b.soon?'Pronto':b.cat||'')+'</span></div>'
      + '</div></div>';
  }

  function heroCardHTML(b, idx, tag) {
    var num  = idx === 0 ? '1' : '2';
    var glow = b.color || (idx === 0 ? '#3b7ef4' : '#6c4df5');
    var maxW = idx === 0 ? 'calc(100% - 205px)' : 'calc(100% - 165px)';
    var coverEl = b.cover
      ? '<div class="hero-cover-ring"></div>'
        + '<div class="hero-cover-float"><img src="'+b.cover+'" alt="'+b.title+'"></div>'
        + '<div class="hero-cover-glow" style="background:'+glow+'"></div>'
      : '';
    return '<div class="hero-card hero-'+num+'" onclick="openBook('+idx+')">'
      + '<div class="hero-orb hero-orb-a"></div>'
      + '<div class="hero-orb hero-orb-b"></div>'
      + coverEl
      + '<div class="hero-content" style="max-width:'+maxW+'">'
      + '<div class="hero-tag"><svg width="11" height="11"><use href="#i-sparkle" style="stroke:#fff"/></svg> '+tag+'</div>'
      + '<h2>'+b.title+'</h2>'
      + '<div class="hero-meta"><span class="hero-info">'+b.cat+'</span></div>'
      + '<button class="play-btn" onclick="event.stopPropagation();openBook('+idx+')">'
        + '<span class="play-icon"><svg width="12" height="12" style="color:#fff"><use href="#i-play"/></svg></span>'
        + ' Escuchar ahora'
      + '</button>'
      + '</div></div>';
  }

  function renderAll() {
    var playable = [], soon = [];
    for (var i = 0; i < books.length; i++) {
      if (books[i].soon) soon.push(i); else playable.push(i);
    }

    var heroGrid = document.getElementById('heroGrid');
    if (heroGrid && playable.length >= 2) {
      heroGrid.innerHTML = heroCardHTML(books[playable[0]], playable[0], 'Más escuchado')
                         + heroCardHTML(books[playable[1]], playable[1], 'Sebael Original');
    } else if (heroGrid && playable.length === 1) {
      heroGrid.innerHTML = heroCardHTML(books[playable[0]], playable[0], 'Destacado');
    }

    var mainGrid = document.getElementById('mainGrid');
    if (mainGrid) {
      var html = '';
      for (var j = 0; j < playable.length; j++) html += cardHTML(books[playable[j]], playable[j]);
      mainGrid.innerHTML = html;
    }

    var soonGrid = document.getElementById('soonGrid');
    if (soonGrid) {
      if (soon.length) {
        var sh = '';
        for (var k = 0; k < soon.length; k++) sh += cardHTML(books[soon[k]], soon[k]);
        soonGrid.innerHTML = sh;
      } else {
        soonGrid.innerHTML = '<p style="color:var(--text-muted);font-size:14px;padding:1rem 0;">Nuevas historias próximamente...</p>';
      }
    }
  }

  function filterCat(cat) {
    var indices = [];
    for (var i = 0; i < books.length; i++) {
      var b = books[i];
      if (cat === 'all' && !b.soon) indices.push(i);
      else if (cat === 'Próximamente' && b.soon) indices.push(i);
      else if (b.cat === cat && !b.soon) indices.push(i);
    }
    var mainGrid = document.getElementById('mainGrid');
    if (mainGrid) {
      var html = '';
      for (var j = 0; j < indices.length; j++) html += cardHTML(books[indices[j]], indices[j]);
      mainGrid.innerHTML = html || '<p style="color:var(--text-muted);font-size:14px;padding:1rem 0;">Sin historias en esta categoría aún.</p>';
    }
  }

  // ── PLAYER ──
  function openBook(idx) {
    var b = books[idx];
    if (!b || b.soon || !b.audio) return;
    currentBook = b;
    audioEl.src = b.audio;
    var saved = getPos(b.id);
    audioEl.addEventListener('loadedmetadata', function() { if (saved > 5) audioEl.currentTime = saved; }, {once:true});
    audioEl.play().catch(function(){});
    isPlaying = true;
    document.getElementById('player-title').textContent  = b.title;
    document.getElementById('player-author').textContent = b.book || 'Sebael';
    var grad = grads[idx % grads.length];
    var headerBg = document.getElementById('player-header-bg');
    headerBg.style.background = b.cover ? 'url("'+b.cover+'") center/cover no-repeat' : grad;
    var coverGlow = document.getElementById('player-cover-glow');
    if (coverGlow) coverGlow.style.background = grad;
    var playerTag = document.getElementById('player-tag');
    if (playerTag) playerTag.textContent = b.cat || 'Historia';
    var epNum = document.getElementById('ep-num');
    if (epNum) epNum.textContent = idx + 1;
    document.getElementById('mini-title').textContent = b.title;
    var miniCover = document.getElementById('mini-cover');
    miniCover.innerHTML = b.cover
      ? '<img src="'+b.cover+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">'
      : '<svg width="22" height="22" style="color:rgba(255,255,255,0.88)"><use href="#i-book"/></svg>';
    var pcIcon = document.getElementById('player-cover-icon');
    if (pcIcon) pcIcon.innerHTML = b.cover
      ? '<img src="'+b.cover+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;">'
      : '<svg width="80" height="80" style="filter:drop-shadow(0 8px 26px rgba(0,0,0,0.45))"><use href="#i-book" style="stroke:rgba(255,255,255,0.72)"/></svg>';
    setIcon(true);
    document.getElementById('player-modal').classList.add('open');
    document.getElementById('mini-player').classList.add('visible');
  }

  function openPlayer(){ document.getElementById('player-modal').classList.add('open'); }
  function closePlayer(){ document.getElementById('player-modal').classList.remove('open'); }

  function setIcon(playing) {
    var h = playing ? '#i-pause' : '#i-play';
    document.querySelector('#pp-icon use').setAttribute('href', h);
    document.querySelector('#mini-pp-icon use').setAttribute('href', h);
  }

  function togglePlay() {
    if (isPlaying) { audioEl.pause(); isPlaying = false; }
    else           { audioEl.play();  isPlaying = true;  }
    setIcon(isPlaying);
  }

  function toggleFav(){ var b=document.getElementById('fav-btn'); b.classList.toggle('faved'); }
  function cycleSpeed(){
    var speeds=[0.75,1,1.25,1.5,2], cur=audioEl.playbackRate||1;
    var ni=(speeds.indexOf(cur)+1)%speeds.length;
    audioEl.playbackRate=speeds[ni];
    document.querySelector('.speed-badge').textContent=speeds[ni]+'×';
  }
  function seekProgress(e){
    if(!audioEl.duration) return;
    var r=e.currentTarget.getBoundingClientRect();
    audioEl.currentTime=((e.clientX-r.left)/r.width)*audioEl.duration;
  }
  function skipTime(s){ audioEl.currentTime=Math.max(0,Math.min(audioEl.duration||0,audioEl.currentTime+s)); }
  function prevTrack(){ skipTime(-15); }
  function nextTrack(){ skipTime(15); }

  audioEl.addEventListener('timeupdate', function(){
    if (!audioEl.duration) return;
    var pct = (audioEl.currentTime / audioEl.duration) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('mini-progress').style.width = pct + '%';
    var cur = Math.floor(audioEl.currentTime);
    document.getElementById('current-time').textContent =
      String(Math.floor(cur/60)).padStart(2,'0') + ':' + String(cur%60).padStart(2,'0');
    if (currentBook) savePos(currentBook.id, audioEl.currentTime);
  });
  audioEl.addEventListener('loadedmetadata', function(){
    var d = Math.floor(audioEl.duration);
    document.getElementById('total-time').textContent =
      String(Math.floor(d/60)).padStart(2,'0') + ':' + String(d%60).padStart(2,'0');
  });
  audioEl.addEventListener('play',  function(){ isPlaying=true;  setIcon(true);  });
  audioEl.addEventListener('pause', function(){ isPlaying=false; setIcon(false); });

  document.getElementById('player-modal').addEventListener('click', function(e){ if(e.target===this) closePlayer(); });

  // ── CARGAR EPISODIOS ──
  fetch('episodes.json?v=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){ books = data; renderAll(); })
    .catch(function(){ console.warn('No se pudo cargar episodes.json'); });
</script>
</body>
</html>
