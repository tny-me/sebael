<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF7EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sebael">
<meta name="description" content="Sebael — Crónicas Bíblicas. Audiolibros sagrados para el alma.">
<title>Sebael — Crónicas Bíblicas</title>

<!-- PWA Manifest inline via JS blob -->
<link rel="manifest" id="manifest-link">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FAF7EF;
    --surface: #FFFFFF;
    --surface2: #F2EDE0;
    --surface3: #E8E0CE;
    --gold: #9B6F2F;
    --gold-light: #C49A3C;
    --gold-dim: #D4B47A;
    --text: #1C1810;
    --text-muted: #6B6052;
    --text-dim: #A09278;
    --border: rgba(155,111,47,0.16);
    --border-hover: rgba(155,111,47,0.36);
    --radius: 14px;
    --radius-sm: 8px;
    --player-h: 90px;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: calc(var(--player-h) + env(safe-area-inset-bottom));
  }

  /* ── GRAIN overlay ──────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.2;
  }

  /* ── TOPBAR ─────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 64px;
    background: rgba(250,247,239,0.94);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 0.5px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .logo-name {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--gold);
  }

  .logo-sub {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    color: var(--text-muted);
  }
  .icon-btn:hover { background: var(--surface3); border-color: var(--border-hover); color: var(--gold); }
  .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }

  .install-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 14px;
    height: 34px;
    border-radius: 40px;
    background: transparent;
    border: 0.5px solid var(--gold-dim);
    color: var(--gold);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .install-btn:hover { background: rgba(196,154,60,0.08); border-color: var(--gold); }
  .install-btn svg { width: 13px; height: 13px; fill: currentColor; }

  /* ── HERO ───────────────────────────── */
  .hero {
    position: relative;
    padding: 52px 24px 44px;
    overflow: hidden;
  }

  .hero-glow {
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse at 50% 30%, rgba(155,111,47,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-eyebrow {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .hero-title {
    font-family: var(--font-serif);
    font-size: clamp(36px, 6vw, 58px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 14px;
  }

  .hero-title em {
    font-style: italic;
    color: var(--gold-light);
  }

  .hero-desc {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-muted);
    max-width: 480px;
    line-height: 1.6;
  }

  /* ── FEATURED STRIP ─────────────────── */
  .featured-wrap {
    padding: 0 24px 36px;
    position: relative;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  .featured-scroll {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 4px;
  }
  .featured-scroll::-webkit-scrollbar { display: none; }

  .feat-card {
    flex-shrink: 0;
    width: 200px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .feat-card:hover { transform: translateY(-3px); }

  .feat-cover {
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--surface2);
    overflow: hidden;
    position: relative;
    margin-bottom: 10px;
  }

  .feat-cover-art {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-serif);
    font-size: 52px;
    color: var(--gold-dim);
    position: relative;
  }

  .feat-cover-art::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(196,154,60,0.06) 0%, transparent 60%);
  }

  .feat-playing-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: rgba(196,154,60,0.9);
    border-radius: 40px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: #0A090E;
  }

  .feat-title {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .feat-meta {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ── CATEGORIES ─────────────────────── */
  .cats-wrap {
    padding: 0 24px 32px;
  }

  .cats-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .cats-row::-webkit-scrollbar { display: none; }

  .cat-pill {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 40px;
    border: 0.5px solid var(--border);
    background: transparent;
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .cat-pill:hover, .cat-pill.active {
    background: rgba(196,154,60,0.1);
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  /* ── GRID ───────────────────────────── */
  .grid-wrap {
    padding: 0 24px 24px;
  }

  .audio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px 16px;
  }

  .audio-card {
    cursor: pointer;
    transition: transform 0.2s;
    position: relative;
  }
  .audio-card:hover { transform: translateY(-4px); }
  .audio-card:hover .card-play-btn { opacity: 1; transform: scale(1); }

  .card-cover {
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--radius);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    overflow: hidden;
    position: relative;
    margin-bottom: 10px;
  }

  .card-art {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-serif);
    font-size: 40px;
    color: var(--gold-dim);
  }

  .card-play-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 16px rgba(196,154,60,0.4);
  }
  .card-play-btn svg { width: 14px; height: 14px; fill: #FAF7EF; margin-left: 2px; }

  .card-title {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .card-book {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .card-duration {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .card-active .card-cover {
    border-color: var(--gold-dim);
  }

  .card-active .card-title { color: var(--gold-light); }

  /* ── AUDIO PLAYER ───────────────────── */
  .player {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    background: rgba(250,247,239,0.97);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 0.5px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .player-progress {
    width: 100%;
    height: 2px;
    background: var(--surface3);
    cursor: pointer;
    position: relative;
  }

  .player-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    width: 0%;
    transition: width 0.3s linear;
    pointer-events: none;
  }

  .player-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    height: calc(var(--player-h) - 2px);
  }

  .player-thumb {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--gold-dim);
    overflow: hidden;
  }

  .player-info {
    flex: 1;
    min-width: 0;
  }

  .player-title {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-book {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  .player-time {
    font-size: 10px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    margin-top: 3px;
  }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }

  .ctrl-play {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    color: #FAF7EF;
  }
  .ctrl-play:hover { transform: scale(1.05); background: var(--gold-light); }
  .ctrl-play svg { width: 18px; height: 18px; fill: currentColor; }
  .ctrl-play.paused svg.pause-icon { display: none; }
  .ctrl-play:not(.paused) svg.play-icon { display: none; }

  .wave-anim {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 18px;
    flex-shrink: 0;
  }
  .wave-anim span {
    display: block;
    width: 3px;
    border-radius: 2px;
    background: var(--gold);
    animation: wave 0.9s ease-in-out infinite;
  }
  .wave-anim span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .wave-anim span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
  .wave-anim span:nth-child(3) { height: 18px; animation-delay: 0.3s; }
  .wave-anim span:nth-child(4) { height: 10px; animation-delay: 0.45s; }
  .wave-anim span:nth-child(5) { height: 6px; animation-delay: 0.6s; }

  .wave-anim.paused span { animation-play-state: paused; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* ── DIVIDER ────────────────────────── */
  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 0 24px 32px;
  }

  /* ── VERSE BANNER ───────────────────── */
  .verse-banner {
    margin: 0 24px 36px;
    padding: 24px 28px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .verse-banner::before {
    content: '"';
    position: absolute;
    top: -10px;
    left: 16px;
    font-family: var(--font-serif);
    font-size: 120px;
    color: rgba(196,154,60,0.07);
    line-height: 1;
    pointer-events: none;
  }

  .verse-text {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 500;
    font-style: italic;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .verse-ref {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ── EMPTY PLAYER STATE ─────────────── */
  .player-empty {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    font-family: var(--font-serif);
  }

  /* ── TOAST ──────────────────────────── */
  .toast {
    position: fixed;
    top: 78px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface3);
    border: 0.5px solid var(--border-hover);
    color: var(--gold-light);
    padding: 10px 20px;
    border-radius: 40px;
    font-size: 12px;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ─────────────────────── */
  @media (min-width: 600px) {
    .audio-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  }
  @media (min-width: 900px) {
    .hero { padding: 72px 48px 56px; }
    .featured-wrap, .cats-wrap, .grid-wrap { padding-left: 48px; padding-right: 48px; }
    .verse-banner { margin-left: 48px; margin-right: 48px; }
    .divider { margin-left: 48px; margin-right: 48px; }
    .topbar { padding: 0 48px; }
    .player-inner { padding-left: 48px; padding-right: 48px; }
    .audio-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }

  /* ── SCROLLBAR ──────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 4px; }

  /* ── ANIMATIONS ─────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .audio-card { animation: fadeUp 0.4s ease both; }
  .audio-card:nth-child(1) { animation-delay: 0.05s; }
  .audio-card:nth-child(2) { animation-delay: 0.1s; }
  .audio-card:nth-child(3) { animation-delay: 0.15s; }
  .audio-card:nth-child(4) { animation-delay: 0.2s; }
  .audio-card:nth-child(5) { animation-delay: 0.25s; }
  .audio-card:nth-child(6) { animation-delay: 0.3s; }
  .audio-card:nth-child(7) { animation-delay: 0.35s; }
  .audio-card:nth-child(8) { animation-delay: 0.4s; }
  .audio-card:nth-child(n+9) { animation-delay: 0.45s; }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">
    <span class="logo-name">Sebael</span>
    <span class="logo-sub">Crónicas Bíblicas</span>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" title="Buscar" onclick="showToast('Búsqueda próximamente')">
      <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
    </button>
    <button class="install-btn" id="installBtn" onclick="handleInstall()">
      <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>
      Instalar App
    </button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-glow"></div>
  <p class="hero-eyebrow">✦ Palabra viva</p>
  <h1 class="hero-title">Las escrituras,<br><em>narradas al alma</em></h1>
  <p class="hero-desc">Crónicas bíblicas en audio. Escucha la Palabra en cada momento, donde quieras.</p>
</section>

<!-- FEATURED -->
<div class="featured-wrap">
  <p class="section-label">✦ Destacados</p>
  <div class="featured-scroll" id="featuredScroll">
    <!-- populated by JS -->
  </div>
</div>

<!-- VERSE BANNER -->
<div class="verse-banner">
  <p class="verse-text" id="verseText">Lámpara es a mis pies tu palabra, y lumbrera a mi camino.</p>
  <p class="verse-ref" id="verseRef">Salmos 119:105</p>
</div>

<!-- CATEGORIES -->
<div class="cats-wrap">
  <div class="cats-row" id="catsRow">
    <button class="cat-pill active" onclick="filterCat('Todos', this)">Todos</button>
    <button class="cat-pill" onclick="filterCat('Génesis', this)">Génesis</button>
    <button class="cat-pill" onclick="filterCat('Éxodo', this)">Éxodo</button>
    <button class="cat-pill" onclick="filterCat('Salmos', this)">Salmos</button>
    <button class="cat-pill" onclick="filterCat('Proverbios', this)">Proverbios</button>
    <button class="cat-pill" onclick="filterCat('Profetas', this)">Profetas</button>
    <button class="cat-pill" onclick="filterCat('Evangelios', this)">Evangelios</button>
    <button class="cat-pill" onclick="filterCat('Apocalipsis', this)">Apocalipsis</button>
  </div>
</div>

<div class="divider"></div>

<!-- GRID -->
<div class="grid-wrap">
  <p class="section-label">✦ Biblioteca</p>
  <div class="audio-grid" id="audioGrid">
    <!-- populated by JS -->
  </div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="player-progress" id="progressBar" onclick="seekAudio(event)">
    <div class="player-fill" id="progressFill"></div>
  </div>
  <div class="player-inner">
    <div class="player-thumb" id="playerThumb">♪</div>
    <div class="player-info">
      <div class="player-title" id="playerTitle">
        <span class="player-empty">Selecciona una historia</span>
      </div>
      <div class="player-book" id="playerBook"></div>
      <div class="player-time" id="playerTime"></div>
    </div>
    <div class="wave-anim paused" id="waveAnim">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" onclick="skipBack()" title="15s atrás">
        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="15" text-anchor="middle" font-size="5" fill="currentColor" font-family="sans-serif">15</text></svg>
      </button>
      <button class="ctrl-play paused" id="playBtn" onclick="togglePlay()">
        <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skipForward()" title="15s adelante">
        <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="15" text-anchor="middle" font-size="5" fill="currentColor" font-family="sans-serif">15</text></svg>
      </button>
    </div>
  </div>
</div>

<script>
const STORIES = [
  { id:1, title:'En el principio', book:'Génesis 1', cat:'Génesis', dur:'18:42', emoji:'✦', color:'#EDE3C4', desc:'La creación del mundo en siete días.' },
  { id:2, title:'El jardín del Edén', book:'Génesis 2–3', cat:'Génesis', dur:'22:10', emoji:'🌿', color:'#C8E6C9', desc:'La historia de Adán y Eva.' },
  { id:3, title:'El arca de Noé', book:'Génesis 6–9', cat:'Génesis', dur:'34:05', emoji:'⛵', color:'#BBDEFB', desc:'El diluvio y la alianza con Dios.' },
  { id:4, title:'El éxodo', book:'Éxodo 12–14', cat:'Éxodo', dur:'41:18', emoji:'🔥', color:'#FFE0B2', desc:'Moisés guía al pueblo hacia la libertad.' },
  { id:5, title:'Salmo 23', book:'Salmos 23', cat:'Salmos', dur:'04:30', emoji:'☁️', color:'#E3E8F5', desc:'El Señor es mi pastor.' },
  { id:6, title:'Salmo 91', book:'Salmos 91', cat:'Salmos', dur:'06:12', emoji:'⚔️', color:'#FFCCBC', desc:'Al abrigo del Altísimo.' },
  { id:7, title:'La sabiduría eterna', book:'Proverbios 8', cat:'Proverbios', dur:'12:48', emoji:'📜', color:'#FFF9C4', desc:'La voz de la sabiduría clama.' },
  { id:8, title:'El valle de los huesos', book:'Ezequiel 37', cat:'Profetas', dur:'14:20', emoji:'💨', color:'#B2DFDB', desc:'Visión de la resurrección del pueblo.' },
  { id:9, title:'La natividad', book:'Lucas 2', cat:'Evangelios', dur:'15:33', emoji:'⭐', color:'#D4E8FF', desc:'El nacimiento del Mesías en Belén.' },
  { id:10, title:'El sermón del monte', book:'Mateo 5–7', cat:'Evangelios', dur:'28:47', emoji:'🏔️', color:'#DCF0DC', desc:'Las bienaventuranzas y la nueva ley.' },
  { id:11, title:'La última cena', book:'Juan 13', cat:'Evangelios', dur:'19:05', emoji:'🍞', color:'#F5E6D0', desc:'Las últimas palabras del Maestro.' },
  { id:12, title:'La resurrección', book:'Juan 20', cat:'Evangelios', dur:'16:22', emoji:'☀️', color:'#FFFDE7', desc:'El primer día de la semana, el sepulcro vacío.' },
  { id:13, title:'Las visiones de Patmos', book:'Apocalipsis 1', cat:'Apocalipsis', dur:'24:14', emoji:'👁️', color:'#E1BEE7', desc:'Juan recibe la revelación en la isla.' },
  { id:14, title:'La mujer y el dragón', book:'Apocalipsis 12', cat:'Apocalipsis', dur:'18:56', emoji:'🐉', color:'#FFCCBC', desc:'La gran señal en el cielo.' },
  { id:15, title:'El rey de reyes', book:'Apocalipsis 19', cat:'Apocalipsis', dur:'21:00', emoji:'👑', color:'#FFF9C4', desc:'El jinete sobre el caballo blanco.' },
  { id:16, title:'La nueva Jerusalén', book:'Apocalipsis 21–22', cat:'Apocalipsis', dur:'26:38', emoji:'✨', color:'#DDEEFF', desc:'El nuevo cielo y la nueva tierra.' },
];

const VERSES = [
  { text: 'Lámpara es a mis pies tu palabra, y lumbrera a mi camino.', ref: 'Salmos 119:105' },
  { text: 'Porque tanto amó Dios al mundo que dio a su Hijo unigénito.', ref: 'Juan 3:16' },
  { text: 'El Señor es mi pastor; nada me faltará.', ref: 'Salmos 23:1' },
  { text: 'Todo lo puedo en Cristo que me fortalece.', ref: 'Filipenses 4:13' },
  { text: 'Confía en el Señor con todo tu corazón.', ref: 'Proverbios 3:5' },
];

let current = null;
let playing = false;
let progress = 0;
let interval = null;
let activeFilter = 'Todos';

function rand(seed, min, max) {
  let x = Math.sin(seed) * 10000;
  return min + Math.floor((x - Math.floor(x)) * (max - min + 1));
}

function buildFeatured() {
  const wrap = document.getElementById('featuredScroll');
  const picks = [0,4,9,11,15];
  picks.forEach((i,j) => {
    const s = STORIES[i];
    const card = document.createElement('div');
    card.className = 'feat-card';
    card.onclick = () => playSong(s);
    const isActive = current && current.id === s.id && playing;
    card.innerHTML = `
      <div class="feat-cover">
        <div class="feat-cover-art" style="background:${s.color};">${s.emoji}</div>
        ${isActive ? `<div class="feat-playing-badge">▶ Reproduciendo</div>` : ''}
      </div>
      <div class="feat-title">${s.title}</div>
      <div class="feat-meta">${s.book} · ${s.dur}</div>
    `;
    wrap.appendChild(card);
  });
}

function buildGrid(filter) {
  const grid = document.getElementById('audioGrid');
  grid.innerHTML = '';
  const list = filter === 'Todos' ? STORIES : STORIES.filter(s => s.cat === filter);
  list.forEach(s => {
    const card = document.createElement('div');
    const isActive = current && current.id === s.id;
    card.className = 'audio-card' + (isActive ? ' card-active' : '');
    card.setAttribute('data-id', s.id);
    card.onclick = () => playSong(s);
    card.innerHTML = `
      <div class="card-cover">
        <div class="card-art" style="background:${s.color};">${s.emoji}</div>
        <div class="card-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="card-title">${s.title}</div>
      <div class="card-book">${s.book}</div>
      <div class="card-duration">${s.dur}</div>
    `;
    grid.appendChild(card);
  });
}

function filterCat(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  buildGrid(cat);
}

function playSong(s) {
  current = s;
  progress = 0;
  playing = true;

  document.getElementById('playerThumb').innerHTML = `<span style="font-size:22px;color:var(--gold-dim);background:${s.color};width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${s.emoji}</span>`;
  document.getElementById('playerTitle').textContent = s.title;
  document.getElementById('playerBook').textContent = s.book;
  document.getElementById('playerTime').textContent = '0:00 / ' + s.dur;

  const btn = document.getElementById('playBtn');
  btn.classList.remove('paused');
  document.getElementById('waveAnim').classList.remove('paused');

  clearInterval(interval);
  const [mm,ss] = s.dur.split(':').map(Number);
  const totalSec = mm * 60 + ss;

  interval = setInterval(() => {
    if (!playing) return;
    progress += 1 / totalSec * 100;
    if (progress >= 100) { progress = 0; clearInterval(interval); }
    document.getElementById('progressFill').style.width = progress + '%';

    const elapsed = Math.floor(progress / 100 * totalSec);
    const em = Math.floor(elapsed / 60);
    const es = elapsed % 60;
    document.getElementById('playerTime').textContent = `${em}:${es.toString().padStart(2,'0')} / ${s.dur}`;
  }, 1000);

  buildGrid(activeFilter);
  showToast(`▶ ${s.title}`);
}

function togglePlay() {
  if (!current) { showToast('Elige una historia primero'); return; }
  playing = !playing;
  const btn = document.getElementById('playBtn');
  btn.classList.toggle('paused', !playing);
  document.getElementById('waveAnim').classList.toggle('paused', !playing);
}

function skipBack() {
  if (!current) return;
  progress = Math.max(0, progress - 2.5);
  document.getElementById('progressFill').style.width = progress + '%';
}

function skipForward() {
  if (!current) return;
  progress = Math.min(100, progress + 2.5);
  document.getElementById('progressFill').style.width = progress + '%';
}

function seekAudio(e) {
  if (!current) return;
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  progress = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
  document.getElementById('progressFill').style.width = progress + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2200);
}

function rotateVerse() {
  const v = VERSES[Math.floor(Math.random() * VERSES.length)];
  document.getElementById('verseText').textContent = v.text;
  document.getElementById('verseRef').textContent = v.ref;
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'flex';
});

function handleInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      if (r.outcome === 'accepted') showToast('¡App instalada!');
      deferredPrompt = null;
    });
  } else {
    showToast('Abre en Chrome y usa "Agregar a pantalla de inicio"');
  }
}

// PWA Manifest
const manifest = {
  name: 'Sebael — Crónicas Bíblicas',
  short_name: 'Sebael',
  description: 'Audiolibros bíblicos sagrados',
  start_url: '/',
  display: 'standalone',
  background_color: '#FAF7EF',
  theme_color: '#FAF7EF',
  orientation: 'portrait',
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23FAF7EF'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='96' font-family='Georgia' fill='%239B6F2F'%3E✦%3C/text%3E%3C/svg%3E", sizes: '192x192', type: 'image/svg+xml' },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23FAF7EF'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='260' font-family='Georgia' fill='%239B6F2F'%3E✦%3C/text%3E%3C/svg%3E", sizes: '512x512', type: 'image/svg+xml' }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
document.getElementById('manifest-link').href = URL.createObjectURL(blob);

// Service Worker (inline)
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'sebael-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)).catch(() => caches.match('/')));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}

// Init
buildFeatured();
buildGrid('Todos');
setInterval(rotateVerse, 12000);
</script>
</body>
</html>
